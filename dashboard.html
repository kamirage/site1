<!DOCTYPE html>

}
.menu a {
    color: white;

    margin-right: 15px;
}
.container {
    border: 1px solid black;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
}
input {
    padding: 5px;
    margin: 5px 0;
    width: 100%;
    box-sizing: border-box;
}
select {
    padding: 5px;
    margin: 5px 0;
    width: 100%;
    box-sizing: border-box;
}
button {
    padding: 10px 20px;
    background: black;
    color: white;
    border: none;
    cursor: pointer;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}
th {
    border: 1px solid black;
    padding: 8px;
    text-align: left;
}
td {
